name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  NDK_VERSION: "27.2.12479018"

jobs:
  check-frontend:
    name: Frontend (TypeScript + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Compiler le frontend
        run: npm run build

  build-desktop:
    name: Desktop (Windows)
    needs: check-frontend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Installer les dépendances
        run: npm ci

      - name: Compiler l'application desktop
        run: npm run build:desktop

      - name: Publier les installateurs
        uses: actions/upload-artifact@v4
        with:
          name: mangatheque-desktop-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  build-android:
    name: Android (APK)
    needs: check-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Installer le NDK Android
        run: sdkmanager "ndk;${{ env.NDK_VERSION }}"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            i686-linux-android,
            x86_64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Installer les dépendances
        run: npm ci

      - name: Initialiser le projet Android Tauri
        run: npm run android:init -- --ci

      - name: Compiler l'APK Android
        run: npm run build:android -- --apk
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: mangatheque-android-apk
          if-no-files-found: warn
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
