name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  NDK_VERSION: "27.2.12479018"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-frontend:
    name: Frontend (TypeScript + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Installer les dependances
        run: npm ci

      - name: Verifier la configuration Supabase
        shell: bash
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::VITE_SUPABASE_URL ou VITE_SUPABASE_ANON_KEY absent dans les secrets GitHub."
            echo "Copiez les valeurs de votre .env local vers Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "Secrets Supabase presents (URL + cle anon)."

      - name: Compiler le frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  build-desktop:
    name: Desktop (Windows)
    needs: check-frontend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Installer les dependances
        run: npm ci

      - name: Verifier le secret de signature Tauri
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY est vide ou absent dans les secrets GitHub."
            echo "Lancez scripts/validate-github-secrets.ps1 en local pour generer la bonne valeur."
            exit 1
          fi
          echo "TAURI_SIGNING_PRIVATE_KEY present (${#TAURI_SIGNING_PRIVATE_KEY} caracteres)."

      - name: Compiler l'application desktop
        run: npm run build:desktop:raw
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Publier les installateurs
        uses: actions/upload-artifact@v4
        with:
          name: mangatheque-desktop-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  build-android:
    name: Android (APK)
    needs: check-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Installer le NDK Android
        run: sdkmanager "ndk;${{ env.NDK_VERSION }}"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            i686-linux-android,
            x86_64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Installer les dependances
        run: npm ci

      - name: Initialiser le projet Android Tauri
        run: test -f src-tauri/gen/android/settings.gradle || npm run android:init:raw -- --ci

      - name: Verifier les secrets Android
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 absent - APK non signe."
          else
            echo "ANDROID_KEYSTORE_BASE64 present (${#ANDROID_KEYSTORE_BASE64} caracteres)."
          fi
          if [ -z "$ANDROID_KEY_ALIAS" ]; then
            echo "::warning::ANDROID_KEY_ALIAS absent - utilisez mangatheque"
          fi

      - name: Configurer la signature Android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "${{ github.workspace }}/mangatheque-release.jks"
            {
              echo "password=${ANDROID_KEYSTORE_PASSWORD}"
              echo "keyAlias=${ANDROID_KEY_ALIAS}"
              echo "storeFile=${{ github.workspace }}/mangatheque-release.jks"
            } > src-tauri/gen/android/keystore.properties
          else
            echo "Secrets Android absents - APK non signe."
          fi

      - name: Compiler l'APK Android
        run: npm run build:android:raw -- --apk
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: mangatheque-android-apk
          if-no-files-found: warn
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
