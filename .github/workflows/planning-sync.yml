name: Sync planning Nautiljon

on:
  schedule:
    # 07:00 Paris (hiver UTC+1) — ajustable via workflow_dispatch
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    name: Planning Nautiljon → Supabase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Synchroniser le planning
        run: node scripts/sync-nautiljon-planning.mjs
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
